name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Trust GitHub SSH host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 644 ~/.ssh/known_hosts

      - name: Fix writable Laravel dirs
        run: |
          cd /var/www/F1_Mini_System
          chmod -R u+rwX storage bootstrap/cache || true

      - name: Deploy latest code
        run: |
          cd /var/www/F1_Mini_System
          git fetch origin
          git checkout main
          git pull --rebase origin main
          docker compose up -d --build
          docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader
          docker compose exec -T app mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions storage/logs bootstrap/cache
          docker compose exec -T app php artisan migrate --force
          docker compose exec -T app php artisan config:clear
          docker compose exec -T app php artisan route:clear
          docker compose exec -T app php artisan view:clear
