name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

      - name: Mark repo as safe
        run: |
          git config --global --add safe.directory /var/www/F1_Mini_System

      - name: Deploy application
        run: |
          cd /var/www/F1_Mini_System

          # Use the running container (root) to restore ownership so git can overwrite files
          docker compose exec -T app chown -R $(id -u):$(id -g) /var/www/html/storage /var/www/html/bootstrap/cache 2>/dev/null || true

          # Pull latest code safely
          git fetch origin
          git reset --hard origin/main

          # Rebuild and start containers (entrypoint.sh handles www-data permissions)
          docker compose up -d --build

          echo "⏳ Waiting for app container to be ready..."
          sleep 10

          # Run migrations and clear caches
          docker compose exec -T app php artisan migrate --force || exit 1
          docker compose exec -T app php artisan config:clear
          docker compose exec -T app php artisan route:clear
          docker compose exec -T app php artisan view:clear
