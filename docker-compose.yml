services:
  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-mini-app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - f1-network
    depends_on:
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: f1-mini-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - f1-network
    depends_on:
      - app

  # Redis for Horizon & Cache
  redis:
    image: redis:7-alpine
    container_name: f1-mini-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - f1-network

  # Laravel Horizon Queue Worker
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-mini-horizon
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan horizon
    networks:
      - f1-network
    depends_on:
      - app
      - redis

networks:
  f1-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
